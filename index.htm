<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聲母辨認大挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fde047; /* yellow-300 */
            background-image: radial-gradient(#fbbf24 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .comic-border {
            border: 4px solid black;
            border-radius: 0.75rem;
            box-shadow: 8px 8px 0px #000;
        }
        .comic-btn {
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.1s;
        }
        .comic-btn:hover {
            transform: translateY(-4px);
            box-shadow: 10px 10px 0px #000;
        }
        .comic-btn:active {
            transform: translateY(8px);
            box-shadow: 2px 2px 0px #000;
        }
        .text-stroke-1 { -webkit-text-stroke: 1px black; }
        .text-stroke-2 { -webkit-text-stroke: 2px black; }
        .text-stroke-white { -webkit-text-stroke: 1px white; }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden">

    <!-- APP CONTAINER -->
    <div id="app" class="relative w-full min-h-screen">
        
        <!-- HOME SCREEN -->
        <div id="home-screen" class="flex flex-col items-center justify-center min-h-screen p-4 text-center">
            <h1 class="text-5xl md:text-7xl font-black mb-12 text-white drop-shadow-[4px_4px_0px_#000] tracking-wider text-stroke-2">
                聲母辨認大挑戰<br><span class="text-3xl">Speech Sound Challenge</span>
            </h1>
            <div class="flex flex-col gap-6 w-full max-w-md">
                <button onclick="startGoal('f_s')" class="bg-cyan-400 p-6 text-3xl text-white comic-border comic-btn text-stroke-1">
                    花 vs. 蛇<br><span class="text-xl">(/f/ vs /s/)</span>
                </button>
                <button onclick="startGoal('ts_s')" class="bg-pink-400 p-6 text-3xl text-white comic-border comic-btn text-stroke-1">
                    之 vs. 蛇<br><span class="text-xl">(/ts/ vs /s/)</span>
                </button>
            </div>
        </div>

        <!-- INSTRUCTIONS SCREEN -->
        <div id="instructions-screen" class="hidden flex-col items-center justify-center min-h-screen p-6">
            <div class="bg-white p-8 max-w-lg w-full text-center comic-border">
                <h2 class="text-4xl font-black mb-6 text-blue-600">遊戲玩法</h2>
                <ul class="text-2xl text-left space-y-4 mb-8 font-bold text-gray-800">
                    <li>👋 左右滑動控制籃子</li>
                    <li>🎁 接住掉下來的禮物</li>
                    <li>💣 小心避開炸彈！</li>
                    <li>👂 聽家長/治療師讀出字詞，選出正確的答案來疊高禮物！</li>
                </ul>
                <button onclick="startGame()" class="bg-green-500 text-white p-4 text-3xl w-full comic-border comic-btn">
                    開始遊戲! (START)
                </button>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="hidden relative w-full h-screen overflow-hidden cursor-crosshair">
            
            <!-- Header Stats -->
            <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-10 pointer-events-none">
                <div class="bg-white px-4 py-2 text-2xl font-black comic-border" id="round-display">
                    回合: 0/10
                </div>
                <div class="bg-white px-4 py-2 text-2xl font-black text-red-600 comic-border" id="score-display">
                    分數: 0
                </div>
            </div>

            <!-- Falling Items Container -->
            <div id="items-container" class="absolute inset-0 pointer-events-none"></div>

            <!-- Basket and Stack -->
            <div id="basket-wrapper" class="absolute bottom-[10%] -translate-x-1/2" style="left: 50%;">
                <div class="relative w-full flex flex-col-reverse items-center justify-end pointer-events-none" id="stack-container">
                    <!-- Basket (always at bottom of stack) -->
                    <div class="text-7xl md:text-8xl mt-10 relative z-50 filter drop-shadow-[0_10px_0_rgba(0,0,0,0.3)]">🧺</div>
                </div>
            </div>

            <!-- Quiz Overlay -->
            <div id="quiz-overlay" class="hidden absolute inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                <div class="bg-yellow-100 p-4 md:p-10 w-full max-w-3xl flex flex-col items-center max-h-full overflow-y-auto comic-border shrink-0">
                    <h2 class="text-3xl md:text-5xl font-black mb-6 text-center text-blue-700 tracking-wide text-stroke-white">
                        請指出家長/治療師說的字
                    </h2>
                    
                    <div class="flex justify-center gap-4 md:gap-8 w-full mb-8 md:mb-12">
                        <div id="word-opt-0" class="flex-1 aspect-[4/3] md:aspect-square bg-white flex items-center justify-center text-6xl md:text-8xl font-black text-black comic-border cursor-pointer hover:bg-yellow-200 transition-colors"></div>
                        <div id="word-opt-1" class="flex-1 aspect-[4/3] md:aspect-square bg-white flex items-center justify-center text-6xl md:text-8xl font-black text-black comic-border cursor-pointer hover:bg-yellow-200 transition-colors"></div>
                    </div>

                    <!-- Therapist Controls -->
                    <div class="w-full bg-gray-800 p-4 rounded-xl border-4 border-black shrink-0">
                        <p class="text-yellow-400 font-bold text-center mb-4 text-base md:text-xl tracking-widest">--- 家長/治療師專用 ---</p>
                        <div class="flex justify-center gap-2 md:gap-4">
                            <button onclick="handleTherapistFeedback(true)" class="flex-1 bg-green-500 text-white font-black text-xl md:text-3xl py-3 md:py-4 comic-border comic-btn active:shadow-none">
                                ✅ 答對 (Correct)
                            </button>
                            <button onclick="handleTherapistFeedback(false)" class="flex-1 bg-red-500 text-white font-black text-xl md:text-3xl py-3 md:py-4 comic-border comic-btn active:shadow-none">
                                ❌ 錯了 (Incorrect)
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Feedback Overlay -->
            <div id="feedback-overlay" class="hidden absolute inset-0 flex items-center justify-center z-50 pointer-events-none">
                <div id="feedback-msg" class="text-6xl md:text-8xl font-black p-8 transform rotate-[-10deg] animate-bounce comic-border text-stroke-2">
                    <!-- Feedback Text goes here -->
                </div>
            </div>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="hidden flex-col items-center justify-center min-h-screen p-6 text-center">
            <div class="bg-white p-10 max-w-lg w-full comic-border">
                <h1 class="text-6xl font-black text-blue-600 mb-6 uppercase">遊戲結束!</h1>
                <div id="end-emoji" class="text-9xl mb-6 drop-shadow-[0_10px_0_rgba(0,0,0,0.2)]">🏆</div>
                <p class="text-4xl font-bold mb-2">你的總分是:</p>
                <p id="end-score" class="text-6xl font-black text-red-500 mb-8">0 / 10</p>
                <p id="end-msg" class="text-2xl font-bold text-gray-600 mb-8"></p>
                
                <div class="flex flex-col gap-4">
                    <button onclick="startGame()" class="bg-cyan-400 text-white p-4 text-3xl w-full comic-border comic-btn">
                        🔄 再玩一次
                    </button>
                    <button onclick="goHome()" class="bg-gray-300 text-black p-4 text-2xl w-full comic-border comic-btn">
                        🏠 回到主頁
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- GAME LOGIC SCRIPT -->
    <script>
        // --- STIMULI DATA ---
        const STIMULI = {
            f_s: { pairs: [ ["花", "沙"], ["發", "撒"], ["法", "殺"], ["火", "鎖"], ["房", "爽"], ["複", "叔"], ["墳", "神"] ] },
            ts_s: { pairs: [ ["紙", "屎"], ["紫", "屎"], ["子", "屎"], ["張", "箱"], ["中", "鬆"], ["真", "新"], ["爭", "生"], ["執", "濕"], ["只", "屎"], ["左", "鎖"], ["這", "瀉"], ["周", "收"], ["進", "信"], ["針", "心"], ["積", "骰"], ["枝", "詩"], ["之", "詩"], ["豬", "書"], ["主", "鼠"], ["組", "數"], ["竹", "叔"], ["祝", "叔"] ] }
        };

        const PRESENTS = ['🎁', '🧸', '🎮', '⚽', '🍬', '🤖', '📚'];
        const BOMB = '💣';
        const MAX_ROUNDS = 10;

        // --- GAME STATE ---
        let currentScreen = 'home';
        let goal = null;
        let score = 0;
        let round = 0;
        let isPaused = false;
        let quizPair = null;
        let caughtItem = null;
        let stack = [];
        let items = [];
        let basketX = 50;
        let gameLoopInterval = null;

        // --- AUDIO SYNTHESIS ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        const playTone = (freq, type, duration, vol = 0.1) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const sounds = {
            catch: () => playTone(600, 'sine', 0.1, 0.2),
            bomb: () => { playTone(100, 'square', 0.3, 0.3); playTone(80, 'sawtooth', 0.4, 0.3); },
            correct: () => { playTone(440, 'sine', 0.1, 0.2); setTimeout(() => playTone(554, 'sine', 0.1, 0.2), 100); setTimeout(() => playTone(659, 'sine', 0.2, 0.2), 200); },
            incorrect: () => { playTone(300, 'triangle', 0.2, 0.3); setTimeout(() => playTone(250, 'triangle', 0.3, 0.3), 150); }
        };

        // --- UI HELPERS ---
        function switchScreen(screenId) {
            ['home-screen', 'instructions-screen', 'game-screen', 'end-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
                document.getElementById(id).classList.remove('flex');
            });
            const target = document.getElementById(screenId);
            target.classList.remove('hidden');
            if(screenId !== 'game-screen') target.classList.add('flex');
            currentScreen = screenId;
        }

        function updateStats() {
            document.getElementById('round-display').innerText = `回合: ${round}/${MAX_ROUNDS}`;
            document.getElementById('score-display').innerText = `分數: ${score}`;
        }

        function renderStack() {
            const container = document.getElementById('stack-container');
            // Remove existing items from stack (keep the basket)
            const basketHtml = `<div class="text-7xl md:text-8xl mt-10 relative z-50 filter drop-shadow-[0_10px_0_rgba(0,0,0,0.3)]">🧺</div>`;
            let stackHtml = basketHtml;
            
            stack.forEach((emoji, idx) => {
                const bottomPos = (idx * 40) + 40;
                const zIdx = stack.length - idx;
                stackHtml += `<div class="text-5xl md:text-6xl absolute" style="bottom: ${bottomPos}px; z-index: ${zIdx}; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.8));">${emoji}</div>`;
            });
            container.innerHTML = stackHtml;
        }

        function showFeedback(text, type) {
            const overlay = document.getElementById('feedback-overlay');
            const msgBox = document.getElementById('feedback-msg');
            msgBox.innerText = text;
            
            // reset classes
            msgBox.className = 'text-6xl md:text-8xl font-black p-8 transform rotate-[-10deg] animate-bounce comic-border text-stroke-2 ' + 
                              (type === 'correct' ? 'bg-green-400 text-white' : type === 'bomb' ? 'bg-red-600 text-yellow-300' : 'bg-orange-400 text-white');
            
            overlay.classList.remove('hidden');
            setTimeout(() => { overlay.classList.add('hidden'); }, type === 'bomb' ? 1000 : 1500);
        }

        // --- GAME ENGINE ---
        function spawnWave() {
            items = [];
            const numPresents = Math.floor(Math.random() * 2) + 1; // 1 or 2 presents
            let positions = [15, 35, 50, 65, 85].sort(() => 0.5 - Math.random()).slice(0, numPresents + 1);
            
            // Add Bomb
            items.push({ id: Math.random(), type: 'bomb', emoji: BOMB, x: positions[0], y: -10, speed: 0.8 + Math.random() * 0.4 });

            // Add Presents
            for (let i = 0; i < numPresents; i++) {
                items.push({ id: Math.random(), type: 'present', emoji: PRESENTS[Math.floor(Math.random() * PRESENTS.length)], x: positions[i + 1], y: -10 - (Math.random() * 10), speed: 0.6 + Math.random() * 0.5 });
            }
        }

        function renderFallingItems() {
            const container = document.getElementById('items-container');
            container.innerHTML = items.map(item => `
                <div class="absolute text-5xl md:text-6xl" style="left: ${item.x}%; top: ${item.y}%; transform: translate(-50%, -50%); filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.5));">
                    ${item.emoji}
                </div>
            `).join('');
        }

        function gameLoop() {
            if (isPaused || currentScreen !== 'game-screen') return;

            let hitPresent = null;
            let hitBomb = false;
            let newItems = [];

            const basketLeft = basketX - 12;
            const basketRight = basketX + 12;
            const stackHeight = stack.length * 5;
            const catchY = 80 - stackHeight; 

            for (let item of items) {
                item.y += item.speed;

                const isCatchingLevel = item.y > catchY && item.y < catchY + 10;
                const isWithinWidth = item.x > basketLeft && item.x < basketRight;

                if (isCatchingLevel && isWithinWidth) {
                    if (item.type === 'bomb') hitBomb = true;
                    else if (item.type === 'present' && !hitPresent) hitPresent = item;
                } else if (item.y < 120) {
                    newItems.push(item);
                }
            }

            if (hitBomb) {
                sounds.bomb();
                showFeedback('BOOM!', 'bomb');
                items = []; // clear
                spawnWave();
            } else if (hitPresent) {
                sounds.catch();
                items = newItems.filter(i => i.id !== hitPresent.id);
                triggerQuiz(hitPresent);
            } else {
                items = newItems;
                if (items.length === 0) spawnWave();
            }

            renderFallingItems();
        }

        // --- CONTROLS ---
        function handlePointerMove(e) {
            if (isPaused || currentScreen !== 'game-screen') return;
            
            // Prevent default scrolling when playing the catching part
            if(e.type === 'touchmove') e.preventDefault();

            let clientX = e.clientX;
            if (e.touches && e.touches.length > 0) clientX = e.touches[0].clientX;
            
            const container = document.getElementById('game-screen').getBoundingClientRect();
            const pct = ((clientX - container.left) / container.width) * 100;
            basketX = Math.max(10, Math.min(90, pct));
            
            document.getElementById('basket-wrapper').style.left = `${basketX}%`;
        }

        document.getElementById('game-screen').addEventListener('mousemove', handlePointerMove);
        document.getElementById('game-screen').addEventListener('touchmove', handlePointerMove, { passive: false });

        // --- QUIZ LOGIC ---
        function triggerQuiz(item) {
            isPaused = true;
            caughtItem = item;
            
            const pairs = STIMULI[goal].pairs;
            const pair = pairs[Math.floor(Math.random() * pairs.length)];
            quizPair = Math.random() > 0.5 ? [pair[0], pair[1]] : [pair[1], pair[0]];
            
            document.getElementById('word-opt-0').innerText = quizPair[0];
            document.getElementById('word-opt-1').innerText = quizPair[1];
            document.getElementById('quiz-overlay').classList.remove('hidden');
            document.getElementById('quiz-overlay').classList.add('flex');
        }

        function handleTherapistFeedback(isCorrect) {
            document.getElementById('quiz-overlay').classList.add('hidden');
            document.getElementById('quiz-overlay').classList.remove('flex');

            if (isCorrect) {
                sounds.correct();
                score++;
                stack.push(caughtItem.emoji);
                renderStack();
                showFeedback('對了!', 'correct');
            } else {
                sounds.incorrect();
                showFeedback('再接再厲!', 'incorrect');
            }

            updateStats();

            setTimeout(() => {
                round++;
                if (round >= MAX_ROUNDS) {
                    endGame();
                } else {
                    updateStats();
                    isPaused = false;
                }
            }, 1500);
        }

        // --- FLOW FUNCTIONS ---
        function startGoal(selectedGoal) {
            initAudio();
            goal = selectedGoal;
            switchScreen('instructions-screen');
        }

        function startGame() {
            score = 0;
            round = 0;
            stack = [];
            items = [];
            isPaused = false;
            
            updateStats();
            renderStack();
            spawnWave();
            switchScreen('game-screen');
            
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameLoop, 20);
        }

        function endGame() {
            clearInterval(gameLoopInterval);
            switchScreen('end-screen');
            
            document.getElementById('end-score').innerText = `${score} / ${MAX_ROUNDS}`;
            
            let emoji = '👍';
            let msg = '很好的嘗試！下次會更好！';
            if (score >= 8) { emoji = '🏆'; msg = '太棒了！你是聲母辨認大師！'; }
            else if (score >= 5) { emoji = '⭐'; msg = '做得好！繼續努力！'; }
            
            document.getElementById('end-emoji').innerText = emoji;
            document.getElementById('end-msg').innerText = msg;
        }

        function goHome() {
            switchScreen('home-screen');
        }

    </script>
</body>
</html>
